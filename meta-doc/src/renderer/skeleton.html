<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaDoc</title>
    <link rel="stylesheet" href="./src/assets/skeleton.css" />
    <script>
      (function () {
        var theme = 'light';
        try {
          var q = new URLSearchParams(window.location.search);
          var t = q.get('theme');
          if (t === 'dark' || t === 'light') theme = t;
          document.documentElement.classList.add(theme);
          document.documentElement.classList.remove(theme === 'dark' ? 'light' : 'dark');
          var root = document.documentElement.style;
          var side = q.get('side');
          var top = q.get('top');
          var list = q.get('list');
          var content = q.get('content');
          var tip = q.get('tip');
          if (side) root.setProperty('--md-skeleton-side', '#' + side.replace(/^#/, ''));
          if (top) root.setProperty('--md-skeleton-top', '#' + top.replace(/^#/, ''));
          if (list) root.setProperty('--md-skeleton-list', '#' + list.replace(/^#/, ''));
          if (content) root.setProperty('--md-skeleton-content', '#' + content.replace(/^#/, ''));
          if (tip) root.setProperty('--md-skeleton-tip-color', '#' + tip.replace(/^#/, ''));
        } catch (e) {}
      })();
    </script>
  </head>
  <body style="overflow: hidden; margin: 0; padding: 0">
    <div id="app">
      <div class="metadoc-skeleton" id="metadoc-skeleton-root" aria-hidden="true">
        <!-- DOM 顺序与 MainTabs 一致：交通灯|标签区|[专注:顶栏菜单占位+尾部按钮]|Logo|窗口按钮；非 mac 用 CSS order 排成 Logo|标签|… -->
        <div class="metadoc-skeleton__navbar" id="metadoc-skeleton-navbar">
          <div class="metadoc-skeleton__macos-traffic-spacer" aria-hidden="true"></div>
          <div class="metadoc-skeleton__tab-strip" aria-hidden="true">
            <!-- 专注模式：与 focus-doc-picker-trigger 对齐（Logo 20px + 标题 + 下拉示意） -->
            <div class="metadoc-skeleton__focus-pill-slot" aria-hidden="true">
              <div class="metadoc-skeleton__focus-doc-trigger">
                <svg
                  class="metadoc-skeleton__focus-doc-logo"
                  width="20"
                  height="20"
                  viewBox="0 0 256 256"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <path
                    d="M64 16 H192 C220 16 240 36 240 64 V192 C240 220 220 240 192 240 H64 C36 240 16 220 16 192 V64 C16 36 36 16 64 16 Z"
                    fill="#e8e8e8"
                  />
                  <g
                    transform="translate(128, 128) scale(1.15) translate(-128, -128)"
                    fill="none"
                    stroke="#333333"
                    stroke-width="11.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M98 114 L74 128 L98 142" />
                    <path d="M138 96 L118 160" />
                    <path d="M158 114 L182 128 L158 142" />
                  </g>
                </svg>
                <span class="metadoc-skeleton__focus-doc-title">MetaDoc</span>
                <svg
                  class="metadoc-skeleton__focus-doc-chevron"
                  width="12"
                  height="12"
                  viewBox="0 0 12 12"
                  aria-hidden="true"
                >
                  <path
                    d="M2.5 4.25L6 7.75l3.5-3.5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    opacity="0.75"
                  />
                </svg>
              </div>
            </div>
          </div>
          <div class="metadoc-skeleton__focus-chrome" aria-hidden="true">
            <div class="metadoc-skeleton__focus-menu-host-skel"></div>
            <div class="metadoc-skeleton__trailing-actions-skel">
              <div class="metadoc-skeleton__skel-icon-btn" aria-hidden="true">
                <!-- 与 MainTabs new-tab-button + ElIcon Plus 一致 -->
                <svg
                  class="metadoc-skeleton__trail-plus-svg"
                  width="16"
                  height="16"
                  viewBox="0 0 16 16"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    fill-rule="evenodd"
                    d="M8.75 2.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z"
                  />
                </svg>
              </div>
              <div
                class="metadoc-skeleton__skel-icon-btn metadoc-skeleton__skel-icon-btn--narrow-gap"
                aria-hidden="true"
              >
                <!-- 专注模式骨架：与 MainTabs 已开启专注时 WorkOnIcon 一致 -->
                <img
                  class="metadoc-skeleton__tb-icon metadoc-skeleton__tb-icon--light"
                  src="./src/assets/icons/work-on-black.svg"
                  alt=""
                  draggable="false"
                />
                <img
                  class="metadoc-skeleton__tb-icon metadoc-skeleton__tb-icon--dark"
                  src="./src/assets/icons/work-on-white.svg"
                  alt=""
                  draggable="false"
                />
              </div>
            </div>
          </div>
          <div class="metadoc-skeleton__logo-tab">
            <div class="metadoc-skeleton__logo-tab-inner" id="skeleton-logo" role="button" aria-label="Logo">
              <svg
                width="20"
                height="20"
                viewBox="0 0 256 256"
                xmlns="http://www.w3.org/2000/svg"
                class="metadoc-skeleton__logo-svg"
                aria-hidden="true"
              >
                <path
                  d="M64 16 H192 C220 16 240 36 240 64 V192 C240 220 220 240 192 240 H64 C36 240 16 220 16 192 V64 C16 36 36 16 64 16 Z"
                  fill="#e8e8e8"
                />
                <g
                  transform="translate(128, 128) scale(1.15) translate(-128, -128)"
                  fill="none"
                  stroke="#333333"
                  stroke-width="11.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M98 114 L74 128 L98 142" />
                  <path d="M138 96 L118 160" />
                  <path d="M158 114 L182 128 L158 142" />
                </g>
              </svg>
            </div>
          </div>
          <div class="metadoc-skeleton__window-controls">
            <button type="button" class="metadoc-skeleton__window-control-btn" id="skeleton-wc-min" aria-label="Minimize">
              <img
                class="metadoc-skeleton__wc-icon metadoc-skeleton__wc-icon--light"
                src="./src/assets/icons/minimize-black.svg"
                alt=""
                aria-hidden="true"
              />
              <img
                class="metadoc-skeleton__wc-icon metadoc-skeleton__wc-icon--dark"
                src="./src/assets/icons/minimize-white.svg"
                alt=""
                aria-hidden="true"
              />
            </button>
            <button
              type="button"
              class="metadoc-skeleton__window-control-btn metadoc-skeleton__window-control-btn--max"
              id="skeleton-wc-max"
              aria-label="Maximize"
            >
              <span class="metadoc-skeleton__wc-maximize-pair">
                <img
                  class="metadoc-skeleton__wc-icon metadoc-skeleton__wc-icon--light"
                  src="./src/assets/icons/maximize-black.svg"
                  alt=""
                  aria-hidden="true"
                />
                <img
                  class="metadoc-skeleton__wc-icon metadoc-skeleton__wc-icon--dark"
                  src="./src/assets/icons/maximize-white.svg"
                  alt=""
                  aria-hidden="true"
                />
              </span>
              <span class="metadoc-skeleton__wc-restore-pair">
                <img
                  class="metadoc-skeleton__wc-icon metadoc-skeleton__wc-icon--light"
                  src="./src/assets/icons/restore-black.svg"
                  alt=""
                  aria-hidden="true"
                />
                <img
                  class="metadoc-skeleton__wc-icon metadoc-skeleton__wc-icon--dark"
                  src="./src/assets/icons/restore-white.svg"
                  alt=""
                  aria-hidden="true"
                />
              </span>
            </button>
            <button
              type="button"
              class="metadoc-skeleton__window-control-btn metadoc-skeleton__window-control-btn--close"
              id="skeleton-wc-close"
              aria-label="Close"
            >
              <svg
                class="metadoc-skeleton__wc-close-svg"
                viewBox="0 0 12 12"
                fill="none"
                stroke="currentColor"
                stroke-width="1"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 2l8 8M10 2L2 10" />
              </svg>
            </button>
          </div>
        </div>
        <div class="metadoc-skeleton__below">
          <div class="metadoc-skeleton__side"></div>
          <div class="metadoc-skeleton__main">
            <div class="metadoc-skeleton__body">
            <!-- 专注模式：左侧 ViewMenu 侧栏（与 WorkspaceExplorer 条同色），无 64px LeftMenu、无右侧 list 条 -->
            <div class="metadoc-skeleton__view-aside" aria-hidden="true"></div>
            <div class="metadoc-skeleton__content">
              <div class="metadoc-skeleton__center">
                <div class="metadoc-skeleton__logo-wrap" id="skeleton-center-logo" aria-hidden="true">
                  <span class="metadoc-skeleton__logo-inner">
                    <svg
                      width="128"
                      height="128"
                      viewBox="0 0 256 256"
                      xmlns="http://www.w3.org/2000/svg"
                      class="metadoc-skeleton__logo-svg--hero"
                    >
                      <path
                        d="M64 16 H192 C220 16 240 36 240 64 V192 C240 220 220 240 192 240 H64 C36 240 16 220 16 192 V64 C16 36 36 16 64 16 Z"
                        fill="#e8e8e8"
                      />
                      <g
                        transform="translate(128, 128) scale(1.15) translate(-128, -128)"
                        fill="none"
                        stroke="#333333"
                        stroke-width="11.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path d="M98 114 L74 128 L98 142" />
                        <path d="M138 96 L118 160" />
                        <path d="M158 114 L182 128 L158 142" />
                      </g>
                    </svg>
                  </span>
                </div>
                <div class="metadoc-skeleton__tips" id="skeleton-tips" aria-live="polite">
                  <span class="metadoc-skeleton__tips-inner" id="skeleton-tip-a"></span>
                  <span class="metadoc-skeleton__tips-inner hide" id="skeleton-tip-b"></span>
                </div>
              </div>
            </div>
            <div class="metadoc-skeleton__list"></div>
            </div>
          </div>
        </div>
        <div class="metadoc-skeleton__shimmer" aria-hidden="true"></div>
      </div>
    </div>
    <script>
      (function () {
        var langKeys = ['zh_CN', 'en_US', 'ja_JP', 'ko_KR', 'de_DE', 'fr_FR'];
        function getLang() {
          try {
            var q = new URLSearchParams(window.location.search);
            var lang = q.get('lang') || navigator.language || '';
            var lower = lang.replace('-', '_').toLowerCase();
            if (lower.indexOf('zh') === 0) return 'zh_CN';
            if (lower.indexOf('en') === 0) return 'en_US';
            if (lower.indexOf('ja') === 0) return 'ja_JP';
            if (lower.indexOf('ko') === 0) return 'ko_KR';
            if (lower.indexOf('de') === 0) return 'de_DE';
            if (lower.indexOf('fr') === 0) return 'fr_FR';
          } catch (e) {}
          return 'en_US';
        }
        function rotateTips(tips, a, b) {
          if (!tips || !tips.length || !a || !b) return;
          var idx = Math.floor(Math.random() * tips.length);
          a.textContent = tips[idx];
          a.classList.remove('hide');
          b.classList.add('hide');
          var step = function () {
            var prev = idx;
            do {
              idx = Math.floor(Math.random() * tips.length);
            } while (tips.length > 1 && idx === prev);
            var next = (a.classList.contains('hide') ? a : b);
            var visible = (next === a ? b : a);
            next.textContent = tips[idx];
            next.classList.remove('hide');
            visible.classList.add('hide');
          };
          setInterval(step, 4500);
        }
        function initLogo(el) {
          if (!el) return;
          el.addEventListener('click', function () {
            el.classList.add('shake');
            setTimeout(function () { el.classList.remove('shake'); }, 1500);
          });
        }
        function getIpc() {
          try {
            return window.electron && window.electron.ipcRenderer;
          } catch (e) {
            return null;
          }
        }
        function sendWindow(channel) {
          var ipc = getIpc();
          if (ipc && typeof ipc.send === 'function') ipc.send(channel);
        }
        function isMacLayout() {
          try {
            var q = new URLSearchParams(window.location.search);
            var mp = q.get('mac');
            if (mp === '1' || mp === 'true') return true;
            if (mp === '0' || mp === 'false') return false;
            var ep = window.electron && window.electron.process && window.electron.process.platform;
            if (ep === 'darwin') return true;
            if (ep === 'win32' || ep === 'linux') return false;
          } catch (e) {}
          return (
            typeof navigator !== 'undefined' &&
            /Mac|iPhone|iPod|iPad/i.test(navigator.platform || '')
          );
        }
        function initWindowControls() {
          var minBtn = document.getElementById('skeleton-wc-min');
          var maxBtn = document.getElementById('skeleton-wc-max');
          var closeBtn = document.getElementById('skeleton-wc-close');
          if (minBtn) minBtn.addEventListener('click', function () { sendWindow('window-minimize'); });
          if (maxBtn) maxBtn.addEventListener('click', function () { sendWindow('window-maximize'); });
          if (closeBtn) closeBtn.addEventListener('click', function () { sendWindow('close-window'); });
          var ipc = getIpc();
          function setMaximized(m) {
            if (maxBtn) maxBtn.classList.toggle('is-maximized', !!m);
            if (maxBtn) maxBtn.setAttribute('aria-label', m ? 'Restore' : 'Maximize');
          }
          if (ipc && typeof ipc.invoke === 'function') {
            ipc.invoke('get-window-maximized').then(setMaximized).catch(function () {});
          }
          if (ipc && typeof ipc.on === 'function') {
            ipc.on('window-maximized-changed', function (_e, maximized) {
              setMaximized(maximized);
            });
          }
        }
        var tipA = document.getElementById('skeleton-tip-a');
        var tipB = document.getElementById('skeleton-tip-b');
        var logoEl = document.getElementById('skeleton-logo');
        var centerLogoEl = document.getElementById('skeleton-center-logo');
        var navEl = document.getElementById('metadoc-skeleton-navbar');
        var skRoot = document.getElementById('metadoc-skeleton-root');
        var skeletonIsMac = isMacLayout();
        var skeletonFocus = false;
        try {
          skeletonFocus = new URLSearchParams(window.location.search).get('focus') === '1';
        } catch (e2) {}
        if (skRoot && skeletonFocus) skRoot.classList.add('is-focus-mode');
        if (navEl && skeletonIsMac) navEl.classList.add('is-mac');
        initLogo(logoEl);
        initLogo(centerLogoEl);
        if (!skeletonIsMac) initWindowControls();
        fetch('./skeleton-tips.json')
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var key = getLang();
            var tips = data[key] || data.zh_CN || data.en_US || [];
            rotateTips(tips, tipA, tipB);
          })
          .catch(function () {
            if (tipA) tipA.textContent = '';
            if (tipB) tipB.textContent = '';
          });
      })();
    </script>
    <script type="module" src="./src/loader.js"></script>
  </body>
</html>
