name: 发布到 Releases 仓库 (Linux x64)

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '发布类型'
        required: true
        type: choice
        options:
          - prod
          - dev
      release_mode:
        description: '发布模式'
        required: true
        type: choice
        options:
          - new_version
          - reuse_latest
        default: 'new_version'
      version_bump:
        description: '版本升级类型（仅在新版本模式下有效）'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - rebuild
      version:
        description: '版本号（可选，留空则使用当前版本或根据升级类型自动计算，仅在新版本模式下有效）'
        required: false
        type: string
      release_notes:
        description: '发布说明（可选，留空则自动生成）'
        required: false
        type: string
  push:
    tags:
      - 'v*'
      - 'dev-*'

env:
  RELEASE_REPO_OWNER: ${{ github.repository_owner }}
  RELEASE_REPO: MetaDoc-Releases

jobs:
  release:
    runs-on: [self-hosted, Linux, X64, ubuntu]
    
    permissions:
      contents: write
    
    steps:
      - name: 安装 Git（如果未安装）
        run: |
          if ! command -v git &> /dev/null; then
            echo "📦 Git 未安装，正在安装..."
            sudo apt-get update
            sudo apt-get install -y git
            echo "✅ Git 安装完成"
          else
            echo "✅ Git 已安装: $(git --version)"
          fi
      
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          clean: false
      
      - name: 更新仓库到最新状态
        run: node meta-doc/scripts/update-repo.js "${{ github.ref }}" "${{ github.ref_name }}"
        continue-on-error: true
      
      - name: 验证 Git 仓库
        run: |
          git --version
          git rev-parse --git-dir
          git rev-parse HEAD
          echo "✅ Git 仓库验证成功"
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meta-doc/package-lock.json
      
      - name: 确定发布类型
        id: release_type
        working-directory: meta-doc
        run: node scripts/get-release-type.js "${{ github.event.inputs.release_type }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
      
      - name: 获取最新版本标签（复用最新版本模式）
        id: latest_release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'reuse_latest'
        run: node meta-doc/scripts/get-latest-release-tag.js "${{ steps.release_type.outputs.type }}"
        env:
          RELEASE_REPO_OWNER: ${{ env.RELEASE_REPO_OWNER }}
          RELEASE_REPO: ${{ env.RELEASE_REPO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true
      
      - name: 读取版本信息
        id: version_info
        working-directory: meta-doc
        run: node scripts/get-version-info.js "${{ github.event.inputs.version }}" "${{ github.event.inputs.version_bump }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION_BUMP: ${{ github.event.inputs.version_bump }}
          LATEST_VERSION: ${{ steps.latest_release.outputs.latest_version }}
      
      - name: 确定标签和 Release 名称
        id: release_info
        working-directory: meta-doc
        run: node scripts/get-release-info.js "${{ steps.release_type.outputs.type }}" "${{ steps.version_info.outputs.clean_version }}" "${{ steps.latest_release.outputs.latest_tag }}"
        env:
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
          CLEAN_VERSION: ${{ steps.version_info.outputs.clean_version }}
          LATEST_TAG: ${{ steps.latest_release.outputs.latest_tag }}
      
      - name: 提交版本更改到仓库
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'new_version'
        working-directory: meta-doc
        run: node scripts/commit-version-changes.js "${{ steps.version_info.outputs.version }}"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: 创建 Git 标签（如果不存在）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'new_version'
        working-directory: meta-doc
        run: node scripts/create-release-tag.js "${{ steps.release_info.outputs.tag }}" "${{ steps.release_info.outputs.release_name }}"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: 检查当前平台文件是否已发布
        id: check_platform_release
        run: node meta-doc/scripts/check-platform-release.js "${{ steps.release_info.outputs.tag }}" "linux"
        env:
          RELEASE_REPO_OWNER: ${{ env.RELEASE_REPO_OWNER }}
          RELEASE_REPO: ${{ env.RELEASE_REPO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PLATFORM: linux
        continue-on-error: true
      
      - name: 检查本地构建产物
        id: check_local_build
        if: steps.check_platform_release.outputs.has_platform_files != 'true'
        working-directory: meta-doc
        run: node scripts/check-local-build.js "${{ steps.version_info.outputs.clean_version }}"
        continue-on-error: true
      
      - name: 安装依赖
        if: steps.check_platform_release.outputs.has_platform_files != 'true' && steps.check_local_build.outputs.local_build_exists != 'true'
        working-directory: meta-doc
        run: npm ci
      
      - name: 构建项目
        if: steps.check_platform_release.outputs.has_platform_files != 'true' && steps.check_local_build.outputs.local_build_exists != 'true'
        working-directory: meta-doc
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
      
      - name: 打包 Linux x64 版本
        if: steps.check_platform_release.outputs.has_platform_files != 'true' && steps.check_local_build.outputs.local_build_exists != 'true'
        working-directory: meta-doc
        run: npx electron-builder --linux --x64 --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: 跳过构建（当前平台文件已发布）
        if: steps.check_platform_release.outputs.has_platform_files == 'true'
        run: echo "✅ 版本 ${{ steps.release_info.outputs.tag }} 已包含 Linux 平台的文件，跳过构建步骤"
      
      - name: 使用本地构建产物
        if: steps.check_platform_release.outputs.has_platform_files != 'true' && steps.check_local_build.outputs.local_build_exists == 'true'
        run: echo "✅ 发现本地构建产物，跳过构建步骤，直接使用现有文件"
      
      - name: 生成发布日志
        id: changelog
        run: node meta-doc/scripts/generate-changelog-to-file.js "${{ steps.version_info.outputs.version }}" "${{ steps.release_type.outputs.type }}" release-notes.txt
      
      - name: 读取发布说明
        id: release_notes
        run: node meta-doc/scripts/prepare-release-notes.js "${{ github.event.inputs.release_notes }}" release-notes.txt final-notes.txt
      
      - name: 发布到 Releases 仓库
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.RELEASE_REPO_OWNER }}/${{ env.RELEASE_REPO }}
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: final-notes.txt
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          files: |
            meta-doc/dist/*.AppImage
            meta-doc/dist/*.deb
            meta-doc/dist/*.snap
          draft: false
          overwrite: ${{ github.event.inputs.release_mode == 'reuse_latest' }}
      
      - name: 保存发布日志
        working-directory: meta-doc
        run: node scripts/save-release-log.js "${{ steps.version_info.outputs.version }}" "${{ steps.release_info.outputs.tag }}" "${{ steps.release_type.outputs.type }}" "${{ steps.release_info.outputs.release_name }}" "${{ steps.release_info.outputs.is_prerelease }}" "${{ github.sha }}" "${{ github.run_id }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      
      - name: 上传发布日志
        uses: actions/upload-artifact@v4
        with:
          name: release-log-${{ steps.release_info.outputs.tag }}-linux
          path: .github/release-logs/release_${{ steps.release_info.outputs.tag }}_*.json
          retention-days: 90

