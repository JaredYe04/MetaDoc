# 发布前校验：登录 → 读取 App/Depot 元数据 →（可选）与 release-steam 相同链路上传最小探测包。
# game-ci/steam-deploy 文档：https://github.com/game-ci/steam-deploy
name: Steam 发布前置校验

on:
  workflow_dispatch:
    inputs:
      skip_depot_upload:
        description: 'yes = 仅登录 + app_info；no = 额外跑 game-ci 上传最小探测包（与 release-steam 同链路，会在 Steam 产生一条构建记录）'
        required: false
        type: choice
        options:
          - 'no'
          - 'yes'
        default: 'no'

env:
  STEAM_APP_ID: '4359310'
  # 与 release-steam / game-ci 默认 depot1 = AppID+1 一致
  STEAM_DEPOT1_ID: '4359311'
  # 与发版工作流 env 对齐，供 API 探测
  RELEASE_REPO: MetaDoc-Releases

jobs:
  # 先发制人：与 release-steam finalize 相同检出方式；避免整管道跑完才在 checkout 403
  github_tokens_smoke:
    name: GitHub 本仓检出（对齐 finalize）
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出当前 workflow 的 SHA（与 finalize 一致，仅 GITHUB_TOKEN）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          token: ${{ github.token }}
          persist-credentials: true

      - name: 校验 GITHUB_TOKEN 可访问本仓库 API
        env:
          # 不会默认注入到 shell；配合 set -u 必须显式传入
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          code=$(curl -sS -o /tmp/gr.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$url")
          echo "GET $url → HTTP $code"
          if [ "$code" != "200" ]; then
            echo "❌ GITHUB_TOKEN 无法读取本仓库。若在组织仓库：检查 Settings → Actions → General → Workflow permissions（建议 Read and write 或至少允许本工作流 contents: read）。"
            head -c 800 /tmp/gr.json 2>/dev/null || true
            exit 1
          fi
          echo "✅ GITHUB_TOKEN 已注入且可读 ${{ github.repository }}"

      - name: 可选探测 secrets.GH_TOKEN 边界
        env:
          PAT: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PAT}" ]; then
            echo "ℹ️ 未配置 secrets.GH_TOKEN，跳过（跨仓发 Release 时再依赖该 PAT）"
            exit 0
          fi
          url="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          code=$(curl -sS -o /tmp/pat_self.json -w '%{http_code}' \
            -H "Authorization: Bearer ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$url")
          echo "GH_TOKEN 访问本仓 → HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::GH_TOKEN 不能读取本仓库（$code）。这是常见配置（PAT 只授权 MetaDoc-Releases）。切勿把该 secret 传给本仓的 actions/checkout，否则会 403 / Write access not granted。"
          else
            echo "✅ GH_TOKEN 也可读本仓（finalize 仍应只用 github.token 检出，边界更清晰）"
          fi
          rel="https://api.github.com/repos/${GITHUB_REPOSITORY_OWNER}/${RELEASE_REPO}"
          code2=$(curl -sS -o /tmp/pat_rel.json -w '%{http_code}' \
            -H "Authorization: Bearer ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$rel")
          echo "GH_TOKEN 访问 ${GITHUB_REPOSITORY_OWNER}/${RELEASE_REPO} → HTTP $code2"
          if [ "$code2" != "200" ]; then
            echo "::warning::GH_TOKEN 无法读取 Releases 仓库（$code2）；发布到 MetaDoc-Releases 的步骤将失败，请为 PAT 授权该仓库或更新 Secret。"
          else
            echo "✅ GH_TOKEN 可读 ${RELEASE_REPO}"
          fi

  steam_validate:
    name: SteamCMD + SteamPipe
    needs: github_tokens_smoke
    runs-on: ubuntu-latest
    steps:
      - name: 检查 Secrets
        run: |
          if [ -z "${{ secrets.STEAM_USERNAME }}" ]; then
            echo "❌ 请配置 STEAM_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.STEAM_CONFIG_VDF }}" ]; then
            echo "❌ 请配置 STEAM_CONFIG_VDF"
            exit 1
          fi
          echo "✅ 必备 Secrets 已配置"

      - name: 写入 config.vdf（Base64 或明文 → 磁盘；并同步到 ~/.local/share/Steam）
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          set -euo pipefail
          M="$GITHUB_WORKSPACE/steam_mount"
          mkdir -p "$M/Steam/config" "$M/dot_local/share/Steam/config"
          OUT="$M/Steam/config/config.vdf"
          SECRET_TMP=$(mktemp)
          DEC_TMP=$(mktemp)
          printf '%s' "$STEAM_CONFIG_VDF" > "$SECRET_TMP"

          wrote=false
          if base64 -d "$SECRET_TMP" > "$DEC_TMP" 2>/dev/null; then
            if grep -qE 'InstallConfigStore|MachineUserConfigStore' "$DEC_TMP" 2>/dev/null; then
              mv "$DEC_TMP" "$OUT"
              wrote=true
              echo "已识别 Secret：**Base64(config.vdf)**"
            fi
          fi
          rm -f "$DEC_TMP"
          if [ "$wrote" != true ]; then
            if grep -qE 'InstallConfigStore|MachineUserConfigStore' "$SECRET_TMP" 2>/dev/null; then
              cp "$SECRET_TMP" "$OUT"
              wrote=true
              echo "已识别 Secret：**明文 config.vdf**"
              echo "::warning::GitHub Secret 存明文仅便于本测试；**release-steam 的 game-ci 输入仍建议存 Base64**（或对同文件 base64 后写入 Secret）。"
            fi
          fi
          rm -f "$SECRET_TMP"

          if [ "$wrote" != true ]; then
            echo "❌ STEAM_CONFIG_VDF 无法识别为 Base64 或明文 config.vdf"
            exit 1
          fi

          SZ=$(wc -c < "$OUT")
          echo "config.vdf 字节数：$SZ"
          if [ "$SZ" -lt 400 ]; then
            echo "❌ config.vdf 过小（<400），无法包含有效 sentry"
            exit 1
          fi
          if ! grep -qiE 'ConnectCache|RefreshToken|autologinuser' "$OUT" 2>/dev/null; then
            echo "::warning::未检测到 ConnectCache 等字段，登录仍可能失败"
          fi

          cp "$OUT" "$M/dot_local/share/Steam/config/config.vdf"
          chmod 600 "$M/Steam/config/config.vdf" "$M/dot_local/share/Steam/config/config.vdf"

      - name: SteamCMD 登录并拉取应用信息（含 depot 列表）
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          set -euo pipefail
          APP="${{ env.STEAM_APP_ID }}"
          DEPOT1="${{ env.STEAM_DEPOT1_ID }}"
          LOG="$GITHUB_WORKSPACE/steamcmd_validate.log"
          if [ -n "${STEAM_PASSWORD}" ]; then
            ARGS=(+set_steam_guard_code "INVALID" +login "$STEAM_USERNAME" "$STEAM_PASSWORD" +app_info_print "$APP" +quit)
          else
            ARGS=(+login "$STEAM_USERNAME" "" +app_info_print "$APP" +quit)
          fi
          set +e
          docker run --rm \
            -v "$GITHUB_WORKSPACE/steam_mount/Steam:/root/Steam" \
            -v "$GITHUB_WORKSPACE/steam_mount/dot_local/share/Steam:/root/.local/share/Steam" \
            steamcmd/steamcmd:ubuntu-22 \
            "${ARGS[@]}" 2>&1 | tee "$LOG"
          EC=${PIPESTATUS[0]}
          set -e
          if [ "$EC" != 0 ]; then
            echo "❌ SteamCMD 退出码 $EC"
            exit "$EC"
          fi
          if grep -qiE 'LogOn Required|Access Denied|Invalid Password|FAILED \(Invalid' "$LOG"; then
            echo "❌ 日志中出现登录/权限类错误"
            exit 1
          fi
          if ! grep -q "$APP" "$LOG"; then
            echo "❌ app_info_print 输出中未出现 AppID $APP，可能账号看不到该应用（非本应用成员/无权限）"
            exit 1
          fi
          if ! grep -q "$DEPOT1" "$LOG"; then
            echo "::warning::输出中未出现首个 Depot ID $DEPOT1；若你未在 Steamworks 创建该 depot 或 App 配置不同，请核对后台"
          else
            echo "✅ 输出中含 Depot $DEPOT1（与默认 depot1 预期一致）"
          fi
          echo "✅ SteamCMD 登录成功，且可读取 App $APP 的元数据"

      - name: 生成供 game-ci 使用的 Base64（来自当前磁盘 config.vdf）
        id: steam_config_for_gameci
        if: github.event.inputs.skip_depot_upload == 'no'
        run: |
          set -euo pipefail
          VDF="$GITHUB_WORKSPACE/steam_mount/Steam/config/config.vdf"
          {
            echo "config_b64<<__STEAM_CFG_B64__"
            base64 -w0 < "$VDF"
            echo ""
            echo "__STEAM_CFG_B64__"
          } >> "$GITHUB_OUTPUT"
          echo "✅ 已生成 game-ci 用 Base64（长度 $(base64 -w0 < "$VDF" | wc -c) 字符）"

      - name: 准备最小探测包（单文件，写入 depot1 / windows）
        if: github.event.inputs.skip_depot_upload == 'no'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/steam_probe/windows"
          printf '%s\n' "MetaDoc CI Steam probe" > "$GITHUB_WORKSPACE/steam_probe/windows/.steam_ci_probe.txt"
          printf 'run_id=%s\nsha=%s\nref=%s\n' "${{ github.run_id }}" "${{ github.sha }}" "${{ github.ref }}" >> "$GITHUB_WORKSPACE/steam_probe/windows/.steam_ci_probe.txt"
          echo "✅ 探测包已写入 steam_probe/windows/"

      - name: SteamPipe 上传探测（game-ci，与 release-steam 相同 Action）
        if: github.event.inputs.skip_depot_upload == 'no'
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ steps.steam_config_for_gameci.outputs.config_b64 }}
          appId: ${{ env.STEAM_APP_ID }}
          buildDescription: 'ci-probe-${{ github.run_id }}-${{ github.sha }}'
          rootPath: steam_probe
          depot1Path: windows
          releaseBranch: ''

      - name: 总结
        if: always()
        run: |
          if [ "${{ github.event.inputs.skip_depot_upload }}" = "yes" ]; then
            echo "✅ 本 run：登录 + app_info（已跳过上传）。发版前建议再选 skip_depot_upload=no 跑通 SteamPipe。"
          else
            echo "✅ 本 run：登录 + app_info + game-ci 上传探测（与 release-steam 一致）。构建成功前提下发版链路可对齐。"
          fi
