name: 发布到 Releases 仓库（多平台统一）

on:
  workflow_dispatch:
    inputs:
      channel:
        description: '渠道'
        required: true
        type: choice
        options:
          - dev
          - prod
      version_type:
        description: '版本类型'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: '自定义版本号（仅当 version_type 为 custom 时必填，如 0.1.0）'
        required: false
        type: string
      runner_win:
        description: 'Windows Runner（关=不构建该平台）'
        required: false
        type: choice
        options:
          - off
          - self-hosted
          - github-hosted
        default: self-hosted
      runner_linux:
        description: 'Linux Runner（关=不构建该平台）'
        required: false
        type: choice
        options:
          - off
          - self-hosted
          - github-hosted
        default: self-hosted
      runner_mac:
        description: 'macOS ARM64 Runner（关=不构建该平台）'
        required: false
        type: choice
        options:
          - off
          - self-hosted
          - github-hosted
        default: self-hosted
      runner_mac_amd64:
        description: 'macOS x64/Intel Runner（关=不构建该平台）'
        required: false
        type: choice
        options:
          - off
          - self-hosted
          - github-hosted
        default: off
      force_rebuild:
        description: '是否强制重新构建'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      release_notes:
        description: '发布说明（可选，留空则自动生成）'
        required: false
        type: string
  push:
    tags:
      - 'v*'
      - 'dev-*'

env:
  RELEASE_REPO_OWNER: ${{ github.repository_owner }}
  RELEASE_REPO: MetaDoc-Releases

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_info.outputs.tag }}
      release_name: ${{ steps.release_info.outputs.release_name }}
      is_prerelease: ${{ steps.release_info.outputs.is_prerelease }}
      clean_version: ${{ steps.version_info.outputs.clean_version }}
      version: ${{ steps.version_info.outputs.version }}
      release_type: ${{ steps.release_type.outputs.type }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meta-doc/package-lock.json

      - name: 恢复 node_modules 缓存
        uses: actions/cache@v4
        id: node-modules
        with:
          path: meta-doc/node_modules
          key: ${{ runner.os }}-meta-doc-node-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-meta-doc-node-

      - name: 缓存诊断（prepare）
        run: echo "node_modules cache-hit=${{ steps.node-modules.outputs.cache-hit }}"

      - name: 安装依赖（缓存命中时跳过）
        if: steps.node-modules.outputs.cache-hit != 'true'
        working-directory: meta-doc
        run: npm ci

      - name: 验证自定义版本号
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_type == 'custom'
        run: |
          if [ -z "${{ github.event.inputs.custom_version }}" ] || [ "${{ github.event.inputs.custom_version }}" = "" ]; then
            echo "❌ version_type 为 custom 时必须填写 custom_version"
            exit 1
          fi
        shell: bash

      - name: 确定发布类型（channel）
        id: release_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.channel }}" >> $GITHUB_OUTPUT
          else
            if echo "${{ github.ref }}" | grep -q 'refs/tags/dev-'; then
              echo "type=dev" >> $GITHUB_OUTPUT
            else
              echo "type=prod" >> $GITHUB_OUTPUT
            fi
          fi
        shell: bash

      - name: 读取版本信息
        id: version_info
        working-directory: meta-doc
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.version_type }}" = "custom" ]; then
              node scripts/get-version-info.js "${{ github.event.inputs.custom_version }}" ""
            else
              node scripts/get-version-info.js "" "${{ github.event.inputs.version_type }}"
            fi
          else
            node scripts/get-version-info.js
          fi
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}

      - name: 确定标签和 Release 名称
        id: release_info
        working-directory: meta-doc
        run: node scripts/get-release-info.js "${{ steps.release_type.outputs.type }}" "${{ steps.version_info.outputs.clean_version }}" ""
        env:
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
          CLEAN_VERSION: ${{ steps.version_info.outputs.clean_version }}
          LATEST_TAG: ""

      - name: 提交版本更改到仓库
        if: github.event_name == 'workflow_dispatch'
        working-directory: meta-doc
        run: node scripts/commit-version-changes.js "${{ steps.version_info.outputs.version }}"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 创建 Git 标签（如果不存在）
        if: github.event_name == 'workflow_dispatch'
        working-directory: meta-doc
        run: node scripts/create-release-tag.js "${{ steps.release_info.outputs.tag }}" "${{ steps.release_info.outputs.release_name }}"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 输出 Runner 矩阵
        id: matrix
        run: |
          RW="${{ github.event.inputs.runner_win || 'self-hosted' }}"
          RL="${{ github.event.inputs.runner_linux || 'self-hosted' }}"
          RM="${{ github.event.inputs.runner_mac || 'self-hosted' }}"
          RM64="${{ github.event.inputs.runner_mac_amd64 || 'off' }}"
          ew=$([ "$RW" = "github-hosted" ] && echo '["windows-latest"]' || echo '["self-hosted","Windows","X64"]')
          el=$([ "$RL" = "github-hosted" ] && echo '["ubuntu-latest"]' || echo '["self-hosted","Linux","X64","ubuntu"]')
          em=$([ "$RM" = "github-hosted" ] && echo '["macos-latest"]' || echo '["self-hosted","macOS","ARM64"]')
          e64=$([ "$RM64" = "github-hosted" ] && echo '["macos-latest"]' || echo '["self-hosted","macOS","x64"]')
          r_win=$([ "$RW" != "off" ] && echo "$ew" || echo '["ubuntu-latest"]')
          r_linux=$([ "$RL" != "off" ] && echo "$el" || echo '["ubuntu-latest"]')
          r_mac=$([ "$RM" != "off" ] && echo "$em" || echo '["ubuntu-latest"]')
          r_mac64=$([ "$RM64" != "off" ] && echo "$e64" || echo '["ubuntu-latest"]')
          entries=()
          entries+=("{\"platform\":\"win\",\"enabled\":$([ "$RW" != "off" ] && echo true || echo false),\"runner_array\":$r_win}")
          entries+=("{\"platform\":\"linux\",\"enabled\":$([ "$RL" != "off" ] && echo true || echo false),\"runner_array\":$r_linux}")
          entries+=("{\"platform\":\"mac\",\"enabled\":$([ "$RM" != "off" ] && echo true || echo false),\"runner_array\":$r_mac}")
          entries+=("{\"platform\":\"mac-amd64\",\"enabled\":$([ "$RM64" != "off" ] && echo true || echo false),\"runner_array\":$r_mac64}")
          printf '[%s]\n' "$(IFS=,; echo "${entries[*]}")" > matrix.json
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          cat matrix.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

  release:
    needs: prepare
    runs-on: ${{ matrix.runner_array }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: write
    steps:
      - name: 平台已关闭（off），跳过构建与发布
        if: matrix.enabled != 'true'
        run: |
          echo "::error::平台 ${{ matrix.platform }} 已选择为关闭（off），不进行构建与发布。此结果不影响其他平台的发布。"
          exit 1
        continue-on-error: true

      - name: 安装 Git（Windows）
        if: matrix.enabled == 'true' && matrix.platform == 'win'
        run: |
          if (-not (Get-Command git -ErrorAction SilentlyContinue)) {
            if (Get-Command choco -ErrorAction SilentlyContinue) { choco install git -y }
            elseif (Get-Command winget -ErrorAction SilentlyContinue) { winget install --id Git.Git -e --source winget }
            else { Write-Host "请手动安装 Git"; exit 1 }
          }
        shell: powershell

      - name: 安装 Git 和构建工具（Linux）
        if: matrix.enabled == 'true' && matrix.platform == 'linux'
        run: |
          if ! command -v git &> /dev/null; then
            . /etc/os-release 2>/dev/null || true
            case "${ID:-unknown}" in
              ubuntu|debian) sudo apt-get update && sudo apt-get install -y git binutils fakeroot ;;
              fedora|rhel|centos) sudo dnf install -y git binutils ;;
              arch|manjaro) sudo pacman -S --noconfirm git binutils fakeroot ;;
              *) echo "请手动安装 Git"; exit 1 ;;
            esac
          fi
          command -v ar &>/dev/null || (case "${ID:-unknown}" in ubuntu|debian) sudo apt-get install -y binutils fakeroot ;; esac)
        shell: bash

      - name: 安装 Git（macOS）
        if: matrix.enabled == 'true' && (matrix.platform == 'mac' || matrix.platform == 'mac-amd64')
        run: |
          if ! command -v git &>/dev/null; then
            if command -v brew &>/dev/null; then
              brew install git
            else
              echo "请先安装 Homebrew"
              exit 1
            fi
          fi
        shell: bash

      - name: 检出代码
        if: matrix.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          clean: true

      - name: 更新仓库到最新状态
        if: matrix.enabled == 'true'
        run: node meta-doc/scripts/update-repo.js "${{ github.ref }}" "${{ github.ref_name }}"
        continue-on-error: true

      - name: 设置 Node.js
        if: matrix.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meta-doc/package-lock.json

      - name: 恢复 node_modules 缓存
        if: matrix.enabled == 'true'
        uses: actions/cache@v4
        id: node-modules
        with:
          path: meta-doc/node_modules
          key: ${{ runner.os }}-${{ matrix.platform }}-meta-doc-node-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-${{ matrix.platform }}-meta-doc-node-

      - name: 缓存诊断（node_modules）
        if: matrix.enabled == 'true'
        run: |
          echo "node_modules cache-hit=${{ steps.node-modules.outputs.cache-hit }}"
          echo "cache-key=${{ runner.os }}-${{ matrix.platform }}-meta-doc-node-<hash>"

      - name: 恢复 Electron 缓存 (Windows)
        if: matrix.enabled == 'true' && matrix.platform == 'win'
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}/electron
          key: ${{ runner.os }}-win-electron-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-win-electron-

      - name: 恢复 Electron 缓存 (Linux)
        if: matrix.enabled == 'true' && matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-linux-electron-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-linux-electron-

      - name: 恢复 Electron 缓存 (macOS)
        if: matrix.enabled == 'true' && (matrix.platform == 'mac' || matrix.platform == 'mac-amd64')
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-mac-electron-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-mac-electron-

      - name: 恢复 electron-builder 缓存 (Windows)
        if: matrix.enabled == 'true' && matrix.platform == 'win'
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}/electron-builder
          key: ${{ runner.os }}-win-electron-builder-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-win-electron-builder-

      - name: 恢复 electron-builder 缓存 (Linux/macOS)
        if: matrix.enabled == 'true' && matrix.platform != 'win'
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: ${{ runner.os }}-${{ matrix.platform }}-electron-builder-${{ hashFiles('meta-doc/package-lock.json') }}
          restore-keys: ${{ runner.os }}-${{ matrix.platform }}-electron-builder-

      - name: 检查当前平台文件是否已发布
        if: matrix.enabled == 'true'
        id: check_platform_release
        run: node meta-doc/scripts/check-platform-release.js "${{ needs.prepare.outputs.tag }}" "${{ matrix.platform == 'win' && 'windows' || (matrix.platform == 'mac' && 'macos' || (matrix.platform == 'mac-amd64' && 'macos-x64' || 'linux')) }}"
        env:
          RELEASE_REPO_OWNER: ${{ env.RELEASE_REPO_OWNER }}
          RELEASE_REPO: ${{ env.RELEASE_REPO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true

      - name: 确定是否需要构建
        if: matrix.enabled == 'true'
        id: should_build
        run: |
          node -e "
          const force = (process.env.FORCE_REBUILD || 'true').toLowerCase() === 'true';
          const hasFiles = process.env.HAS_PLATFORM_FILES === 'true';
          let shouldBuild, forceRebuild;
          if (force) { shouldBuild = true; forceRebuild = true; }
          else if (hasFiles) { shouldBuild = false; forceRebuild = false; }
          else { shouldBuild = true; forceRebuild = false; }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_build=' + shouldBuild + '\nforce_rebuild=' + forceRebuild + '\n');
          "
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'true' }}
          HAS_PLATFORM_FILES: ${{ steps.check_platform_release.outputs.has_platform_files }}

      - name: 检查本地构建产物
        if: matrix.enabled == 'true' && steps.should_build.outputs.should_build == 'true' && steps.should_build.outputs.force_rebuild != 'true'
        id: check_local_build
        working-directory: meta-doc
        run: |
          node scripts/check-local-build.js "${{ needs.prepare.outputs.clean_version }}" "${{ matrix.platform == 'win' && 'windows' || (matrix.platform == 'linux' && 'linux' || 'macos') }}"
        continue-on-error: true

      - name: 安装依赖
        if: matrix.enabled == 'true' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true') && steps.node-modules.outputs.cache-hit != 'true'
        working-directory: meta-doc
        run: |
          node -e "
          const c = require('child_process');
          const p = process.cwd();
          const run = (cmd) => c.execSync(cmd, { cwd: p, stdio: 'inherit' });
          try { run('npm ci'); } catch (e) {
            console.warn('npm ci 失败，尝试使用国内镜像...');
            run('npm config set registry https://registry.npmmirror.com');
            run('npm ci');
          }
          "

      - name: 生成发布说明（release 阶段本地生成，不依赖 prepare artifact）
        if: matrix.enabled == 'true'
        run: |
          node meta-doc/scripts/generate-changelog-to-file.js "${{ needs.prepare.outputs.version }}" "${{ needs.prepare.outputs.release_type }}" release-notes.txt
          node meta-doc/scripts/prepare-release-notes.js "${{ github.event.inputs.release_notes || '' }}" release-notes.txt final-notes.txt

      - name: 生成 Linux 图标（如果不存在）
        if: matrix.enabled == 'true' && matrix.platform == 'linux' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: '[ -f build/icon.png ] || npm run generate-icons || true'

      - name: 生成 macOS 图标（如果不存在）
        if: matrix.enabled == 'true' && (matrix.platform == 'mac' || matrix.platform == 'mac-amd64') && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: '[ -f build/icon.icns ] || npm run generate-icons || true'

      - name: 构建项目
        if: matrix.enabled == 'true' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc

      - name: 清理旧 Linux 产物
        if: matrix.enabled == 'true' && matrix.platform == 'linux' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        run: rm -f meta-doc/dist/*.AppImage meta-doc/dist/*.deb meta-doc/dist/*.snap || true

      - name: 打包 Windows 版本
        if: matrix.enabled == 'true' && matrix.platform == 'win' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: npx electron-builder --win --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 打包 Linux x64 版本
        if: matrix.enabled == 'true' && matrix.platform == 'linux' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: npx electron-builder --linux --x64 --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 打包 macOS ARM64 版本
        if: matrix.enabled == 'true' && matrix.platform == 'mac' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: npx electron-builder --mac --arm64 --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 打包 macOS x64 版本
        if: matrix.enabled == 'true' && matrix.platform == 'mac-amd64' && steps.should_build.outputs.should_build == 'true' && (steps.should_build.outputs.force_rebuild == 'true' || steps.check_local_build.outputs.local_build_exists != 'true')
        working-directory: meta-doc
        run: npx electron-builder --mac --x64 --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 发布 Windows 产物
        if: matrix.enabled == 'true' && matrix.platform == 'win' && steps.should_build.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.RELEASE_REPO_OWNER }}/${{ env.RELEASE_REPO }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: main
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: final-notes.txt
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            meta-doc/dist/*.exe
            meta-doc/dist/*.yml
            meta-doc/dist/*.blockmap
          draft: false

      - name: 准备 Linux 产物列表
        if: matrix.enabled == 'true' && matrix.platform == 'linux' && steps.should_build.outputs.should_build == 'true'
        id: release_files_linux
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "meta-doc/dist/meta-doc-${{ needs.prepare.outputs.clean_version }}.AppImage" >> $GITHUB_OUTPUT
          echo "meta-doc/dist/meta-doc_${{ needs.prepare.outputs.clean_version }}_amd64.deb" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "snap_file=meta-doc/dist/meta-doc_${{ needs.prepare.outputs.clean_version }}_amd64.snap" >> $GITHUB_OUTPUT
        shell: bash

      - name: 发布 Linux 产物（AppImage + deb）
        if: matrix.enabled == 'true' && matrix.platform == 'linux' && steps.should_build.outputs.should_build == 'true'
        id: release_linux
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.RELEASE_REPO_OWNER }}/${{ env.RELEASE_REPO }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: main
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: final-notes.txt
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: ${{ steps.release_files_linux.outputs.files }}
          draft: false

      - name: 上传 Snap 包（Linux）
        if: matrix.enabled == 'true' && matrix.platform == 'linux' && steps.should_build.outputs.should_build == 'true' && steps.release_linux.outcome == 'success'
        run: |
          SNAP="meta-doc/dist/meta-doc_${{ needs.prepare.outputs.clean_version }}_amd64.snap"
          if [ ! -f "$SNAP" ]; then exit 0; fi
          URL="${{ steps.release_linux.outputs.upload_url }}"
          URL="${URL%%\{*}"
          curl -sL -X POST -H "Authorization: token ${{ secrets.GH_TOKEN }}" -H "Content-Type: application/octet-stream" --data-binary "@$SNAP" "${URL}?name=$(basename "$SNAP")" -o /dev/null -w "%{http_code}" || true
        continue-on-error: true
        shell: bash

      - name: 发布 macOS 产物
        if: matrix.enabled == 'true' && (matrix.platform == 'mac' || matrix.platform == 'mac-amd64') && steps.should_build.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.RELEASE_REPO_OWNER }}/${{ env.RELEASE_REPO }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: main
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: final-notes.txt
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            meta-doc/dist/*.dmg
            meta-doc/dist/*.zip
          draft: false

      - name: 保存发布日志
        if: matrix.enabled == 'true'
        working-directory: meta-doc
        run: |
          node scripts/save-release-log.js "${{ needs.prepare.outputs.version }}" "${{ needs.prepare.outputs.tag }}" "${{ needs.prepare.outputs.release_type }}" "${{ needs.prepare.outputs.release_name }}" "${{ needs.prepare.outputs.is_prerelease }}" "${{ github.sha }}" "${{ github.run_id }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: 上传发布日志
        if: ${{ matrix.enabled == 'true' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-log-${{ needs.prepare.outputs.tag }}-${{ matrix.platform }}
