name: 发布到 Releases 仓库

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '发布类型'
        required: true
        type: choice
        options:
          - prod
          - dev
      version:
        description: '版本号（可选，留空则使用当前版本）'
        required: false
        type: string
      release_notes:
        description: '发布说明（可选，留空则自动生成）'
        required: false
        type: string
  push:
    tags:
      - 'v*'
      - 'dev-*'

env:
  RELEASE_REPO_OWNER: ${{ github.repository_owner }}
  RELEASE_REPO: MetaDoc-Releases

jobs:
  release:
    runs-on: self-hosted
    
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 读取版本信息
        id: version_info
        run: node scripts/get-version-info.js "${{ github.event.inputs.version }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
      
      - name: 确定发布类型
        id: release_type
        run: node scripts/get-release-type.js "${{ github.event.inputs.release_type }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
      
      - name: 构建项目（分步构建以减少内存使用）
        run: npm run build:sequential
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --gc-interval=100 --expose-gc --optimize-for-size --always-compact
      
      - name: 打包 Windows 版本
        run: electron-builder --win
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --gc-interval=100 --expose-gc --optimize-for-size --always-compact
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: 生成发布日志
        id: changelog
        run: node scripts/generate-changelog.js "${{ steps.version_info.outputs.version }}" "${{ steps.release_type.outputs.type }}" > release-notes.txt
      
      - name: 读取发布说明
        id: release_notes
        run: node -e "const fs=require('fs');const input='${{ github.event.inputs.release_notes }}';const content=input||fs.readFileSync('release-notes.txt','utf-8');fs.writeFileSync('final-notes.txt',content);process.stdout.write('notes='+content.replace(/\n/g,'\\n')+'\n')"
      
      - name: 确定标签和 Release 名称
        id: release_info
        run: node scripts/get-release-info.js "${{ steps.release_type.outputs.type }}" "${{ steps.version_info.outputs.clean_version }}"
      
      - name: 发布到 Releases 仓库
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.RELEASE_REPO }}
          owner: ${{ env.RELEASE_REPO_OWNER }}
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: final-notes.txt
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml
            release/*.exe
            release/*.yml
            release/*.yaml
          draft: false
      
      - name: 保存发布日志
        run: node scripts/save-release-log.js "${{ steps.version_info.outputs.version }}" "${{ steps.release_info.outputs.tag }}" "${{ steps.release_type.outputs.type }}" "${{ steps.release_info.outputs.release_name }}" "${{ steps.release_info.outputs.is_prerelease }}" "${{ github.sha }}" "${{ github.run_id }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      
      - name: 上传发布日志
        uses: actions/upload-artifact@v3
        with:
          name: release-log-${{ steps.release_info.outputs.tag }}
          path: .github/release-logs/release_${{ steps.release_info.outputs.tag }}_*.json
          retention-days: 90

