name: 发布到 Releases 仓库

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '发布类型'
        required: true
        type: choice
        options:
          - prod
          - dev
      version:
        description: '版本号（可选，留空则使用当前版本）'
        required: false
        type: string
      release_notes:
        description: '发布说明（可选，留空则自动生成）'
        required: false
        type: string
  push:
    tags:
      - 'v*'
      - 'dev-*'

env:
  RELEASE_REPO_OWNER: ${{ github.repository_owner }}
  RELEASE_REPO: MetaDoc-Releases

jobs:
  release:
    runs-on: self-hosted
    
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meta-doc/package-lock.json
      
      - name: 读取版本信息
        id: version_info
        working-directory: meta-doc
        run: node scripts/get-version-info.js "${{ github.event.inputs.version }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
      
      - name: 确定发布类型
        id: release_type
        working-directory: meta-doc
        run: node scripts/get-release-type.js "${{ github.event.inputs.release_type }}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
      
      - name: 确定标签和 Release 名称
        id: release_info
        working-directory: meta-doc
        run: node scripts/get-release-info.js "${{ steps.release_type.outputs.type }}" "${{ steps.version_info.outputs.clean_version }}"
      
      - name: 检查版本是否已发布
        id: check_release
        run: node meta-doc/scripts/check-release-exists.js "${{ steps.release_info.outputs.tag }}"
        env:
          RELEASE_REPO_OWNER: ${{ env.RELEASE_REPO_OWNER }}
          RELEASE_REPO: ${{ env.RELEASE_REPO }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true
      
      - name: 检查本地构建产物
        id: check_local_build
        if: steps.check_release.outputs.release_exists != 'true'
        working-directory: meta-doc
        run: node scripts/check-local-build.js "${{ steps.version_info.outputs.clean_version }}"
        continue-on-error: true
      
      - name: 安装依赖
        if: steps.check_release.outputs.release_exists != 'true' && steps.check_local_build.outputs.local_build_exists != 'true'
        working-directory: meta-doc
        run: npm ci
      
      - name: 构建项目
        if: steps.check_release.outputs.release_exists != 'true' && steps.check_local_build.outputs.local_build_exists != 'true'
        working-directory: meta-doc
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
      
      - name: 打包 Windows 版本
        if: steps.check_release.outputs.release_exists != 'true' && steps.check_local_build.outputs.local_build_exists != 'true'
        working-directory: meta-doc
        run: npx electron-builder --win --publish never
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096 --expose-gc
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: 跳过构建（版本已发布）
        if: steps.check_release.outputs.release_exists == 'true'
        run: echo "✅ 版本 ${{ steps.release_info.outputs.tag }} 已在 Releases 中发布，跳过构建步骤"
      
      - name: 使用本地构建产物
        if: steps.check_release.outputs.release_exists != 'true' && steps.check_local_build.outputs.local_build_exists == 'true'
        run: echo "✅ 发现本地构建产物，跳过构建步骤，直接使用现有文件"
      
      - name: 生成发布日志
        id: changelog
        working-directory: meta-doc
        run: node scripts/generate-changelog-to-file.js "${{ steps.version_info.outputs.version }}" "${{ steps.release_type.outputs.type }}" ../release-notes.txt
      
      - name: 读取发布说明
        id: release_notes
        working-directory: meta-doc
        run: node scripts/prepare-release-notes.js "${{ github.event.inputs.release_notes }}" ../release-notes.txt ../final-notes.txt
      
      - name: 发布到 Releases 仓库
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.RELEASE_REPO }}
          owner: ${{ env.RELEASE_REPO_OWNER }}
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: final-notes.txt
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          files: |
            meta-doc/dist/*.exe
            meta-doc/dist/*.yml
            meta-doc/dist/*.yaml
            meta-doc/release/*.exe
            meta-doc/release/*.yml
            meta-doc/release/*.yaml
          draft: false
          overwrite: true
      
      - name: 保存发布日志
        working-directory: meta-doc
        run: node scripts/save-release-log.js "${{ steps.version_info.outputs.version }}" "${{ steps.release_info.outputs.tag }}" "${{ steps.release_type.outputs.type }}" "${{ steps.release_info.outputs.release_name }}" "${{ steps.release_info.outputs.is_prerelease }}" "${{ github.sha }}" "${{ github.run_id }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      
      - name: 上传发布日志
        uses: actions/upload-artifact@v4
        with:
          name: release-log-${{ steps.release_info.outputs.tag }}
          path: .github/release-logs/release_${{ steps.release_info.outputs.tag }}_*.json
          retention-days: 90
